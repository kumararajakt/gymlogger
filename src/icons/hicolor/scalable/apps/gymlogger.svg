<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#607D8B"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="plateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="plateGradInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
  </defs>

  <!-- background circle -->
  <circle cx="64" cy="64" r="60" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="2"/>

  <!-- bar -->
  <rect x="14" y="58" width="100" height="12" rx="6" ry="6" fill="url(#barGrad)"/>

  <!-- left outer plate -->
  <rect x="18" y="36" width="16" height="56" rx="4" ry="4" fill="url(#plateGrad)"/>
  <!-- left inner plate -->
  <rect x="34" y="42" width="12" height="44" rx="3" ry="3" fill="url(#plateGradInner)"/>

  <!-- right outer plate -->
  <rect x="94" y="36" width="16" height="56" rx="4" ry="4" fill="url(#plateGrad)"/>
  <!-- right inner plate -->
  <rect x="82" y="42" width="12" height="44" rx="3" ry="3" fill="url(#plateGradInner)"/>

  <!-- center grip dots -->
  <circle cx="52" cy="64" r="2" fill="#B0BEC5" opacity="0.6"/>
  <circle cx="64" cy="64" r="2" fill="#B0BEC5" opacity="0.6"/>
  <circle cx="76" cy="64" r="2" fill="#B0BEC5" opacity="0.6"/>
</svg>
